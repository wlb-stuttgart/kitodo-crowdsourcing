<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<f:layout name="Default" />

<f:section name="Main">
    <f:flashMessages/>
    <f:if condition="{cookieWarning}">
        <f:render partial="CookieWarning" />
    </f:if>

    <f:if condition="{messageKey}">
        <h3>
            <f:render partial="RenderLabelOrMessage" arguments="{key: '{messageKey}_header'}"/>
        </h3>
        <p>
            <f:render partial="RenderLabelOrMessage" arguments="{key: '{messageKey}_message'}"/>
        </p>
    </f:if>

    <f:if condition="{onSubmit}">
        <f:then>
            <f:form class="form-control" target="_top" fieldNamePrefix="" action="login" onsubmit="{onSubmit}" additionalAttributes="{spellcheck: 'false'}">
                <f:render section="content" arguments="{_all}"/>
            </f:form>
        </f:then>
        <f:else>
            <f:form class="form-control" target="_top" fieldNamePrefix="" action="login" additionalAttributes="{spellcheck: 'false'}">
                <f:render section="content" arguments="{_all}"/>
            </f:form>
        </f:else>
    </f:if>

    <f:if condition="{settings.showForgotPassword}">
        <f:link.action action="recovery" controller="PasswordRecovery">
            <f:render partial="RenderLabelOrMessage" arguments="{key: 'forgot_header'}"/>
        </f:link.action>
    </f:if>

    <f:section name="content">
        <fieldset>
            <legend>
                <f:translate key="login"/>
            </legend>
            <div>
                <label>
                    <f:translate key="username"/>
                    <f:form.textfield class="form-control" name="user" required="true" additionalAttributes="{autocomplete: 'username'}"/>
                </label>
            </div>
            <div>
                <label>
                    <f:translate key="password"/>
                    <f:form.password class="form-control" name="pass" additionalAttributes="{required: 'required', autocomplete: 'current-password'}"/>
                </label>
            </div>

            <f:if condition="{permaloginStatus} > -1">
                <div>
                    <label>
                        <f:translate id="permalogin"/>
                        <f:if condition="{permaloginStatus} == 1">
                            <f:then>
                                <f:form.hidden name="permalogin" value="0" additionalAttributes="{disabled: 'disabled'}"/>
                                <f:form.checkbox class="form-control" name="permalogin" id="permalogin" value="1" checked="checked"/>
                            </f:then>
                            <f:else>
                                <f:form.hidden name="permalogin" value="0"/>
                                <f:form.checkbox class="form-control" name="permalogin" id="permalogin" value="1"/>
                            </f:else>
                        </f:if>
                    </label>
                </div>
            </f:if>

            <div class="mt-3">
                <f:form.submit class="btn btn-secondary" value="{f:translate(key: 'login')}" name="submit"/>
            </div>

            <div class="mt-3">
                <f:link.page pageUid="{settings.crowdsourcingRegister}">Ein neues Konto erstellen</f:link.page>
            </div>

            <div class="felogin-hidden">
                <f:form.hidden name="logintype" value="login"/>
                <f:form.hidden name="pid" value="{storagePid}"/>
                <f:if condition="{redirectURL}!=''">
                    <f:form.hidden name="redirect_url" value="{redirectURL}" />
                </f:if>
                <f:if condition="{referer}!=''">
                    <f:form.hidden name="referer" value="{referer}" />
                </f:if>
                <f:if condition="{redirectReferrer}!=''">
                    <f:form.hidden name="redirectReferrer" value="off" />
                </f:if>
                <f:if condition="{noRedirect}!=''">
                    <f:form.hidden name="noredirect" value="1" />
                </f:if>
            </div>
        </fieldset>
    </f:section>
</f:section>

</html>
