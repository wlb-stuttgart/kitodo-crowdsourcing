<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Email" />
<f:section name="Main">
    <f:spaceless>
        <f:variable name="recoveryLink">
            <f:link.external uri="{url}" target="_blank"><f:translate key="password_recovery_link" extensionName="felogin"/></f:link.external>
        </f:variable>
        <f:format.raw><f:format.nl2br>{f:translate(
                key: 'forgot_validate_reset_password_html',
                extensionName: 'felogin',
                arguments: '{ 0: recoveryLink, 1: validUntil }'
                )}
            </f:format.nl2br></f:format.raw>
        <f:format.raw><f:format.nl2br>
                {f:translate(
                extensionName: 'sf_register',
                key: 'email_signature',
                )}
        </f:format.nl2br></f:format.raw>
    </f:spaceless>
</f:section>
</html>
