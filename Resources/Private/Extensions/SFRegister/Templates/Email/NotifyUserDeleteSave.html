	xmlns:register="http://typo3.org/ns/Evoweb/SfRegister/ViewHelpers"
	data-namespace-typo3-fluid="true">

<f:layout name="Email" />

<f:section name="Main">
	<f:format.raw><f:translate id="email_user_salutation"/></f:format.raw>,<br>
	<f:format.raw><f:translate id="email_user_account_delete" arguments="{0: settings.sitename}"/></f:format.raw><br>
	<f:format.raw><f:translate id="email_user_delete_link_description"/></f:format.raw><br>
	<register:link.action arguments="{user: user.uid}" action="confirm" controller="FeuserDelete" absolute="true">
		<f:translate id="email_user_delete_link"/>
	</register:link.action>

	<br><br>

	<f:translate id="email_user_registration_thank_you"/>

	<br><br>

	<f:format.raw>
		<f:format.nl2br><f:translate id="email_signature"/></f:format.nl2br>
	</f:format.raw>

</f:section>

</html>
