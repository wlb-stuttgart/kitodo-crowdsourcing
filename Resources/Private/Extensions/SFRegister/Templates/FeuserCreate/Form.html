
<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<f:layout name="LoggedOut"/>

<f:section name="Main">
	<div class="modal fade" id="registerModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true" data-bs-backdrop="static">

		<div class="modal-dialog modal-dialog-centered" role="document">
			<div class="modal-content">
				<div class="modal-header">
					<h2 class="modal-title" id="exampleModalLabel">
						Registrieren
					</h2>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>

				<f:form action="preview" name="user" id="sfrForm" class="px-3" object="{user}" enctype="multipart/form-data">
					<div class="modal-body">
						<f:render partial="FormErrors" arguments="{for: 'user'}"/>
						<f:render partial="FieldError" arguments="{field: 'uid'}"/>

						<div class="form-row">
							<f:for each="{settings.fields.selected}" as="fieldName" iteration="iteration">
								<f:if condition="{fieldName} !== 'submit'">
									<f:alias map="{options: '{settings.fields.configuration.{fieldName}}'}">
										<f:render partial="Form/{options.partial}"
												  arguments="{user: user, fieldName: fieldName, options: options, settings: settings, iteration: iteration}"/>
									</f:alias>
								</f:if>
							</f:for>
						</div>

						<div class="mandatory">
							<f:format.raw><f:translate extensionName="sf_register" id="info_mandatory_fields"/></f:format.raw>
						</div>

						<f:if condition="{settings.helpLink}">
							<div class="register-help">
								<f:link.typolink parameter="{settings.helpLink}"
												 target="_blank"
												 additionalAttributes="{rel:'noopener'}">
									<f:translate extensionName="sf_register" id="register_help"/>
								</f:link.typolink>
							</div>
						</f:if>
					</div>

					<div class="modal-footer">
						<f:alias map="{options: '{settings.fields.configuration.submit}'}">
							<f:render partial="Form/Modal/{options.partial}"
									  arguments="{user: user, fieldName: fieldName, options: options, settings: settings, iteration: iteration}"/>
						</f:alias>
					</div>
				</f:form>
			</div>
		</div>
	</div>
</f:section>

</html>
