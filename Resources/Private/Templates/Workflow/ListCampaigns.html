<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Frontend"/>

<f:section name="main">
    <div class="container">
        <!-- Search Area -->
        <div class="row mb-4">
            <div class="col-12">
                <form class="d-flex justify-content-between align-items-center">
                    <div class="form-group mb-0">
                        <input type="text" class="form-control" id="searchInput" placeholder="Search..." aria-label="Search">
                    </div>

                    <div class="d-flex">
                        <div class="form-group mb-0 ms-2">
                            <select class="form-select" id="filter1">
                                <option selected>Filter 1</option>
                                <option value="option1">Option 1</option>
                                <option value="option2">Option 2</option>
                                <option value="option3">Option 3</option>
                            </select>
                        </div>

                        <div class="form-group mb-0 ms-2">
                            <select class="form-select" id="filter2">
                                <option selected>Filter 2</option>
                                <option value="option1">Option 1</option>
                                <option value="option2">Option 2</option>
                                <option value="option3">Option 3</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
        </div>

<f:comment>
        <ul class="list-unstyled row">
            <f:for each="{campaigns}" as="campaign">
                <li class="col-xl-4 col-lg-6 col-md-6 col-sm-12 mb-4">
                    <div class="card d-flex flex-row" style="height: 100%;">

                        <f:if condition="{campaign.image}">
                            <f:then>
                                <img src="{campaign.image}" class="card-img-left" alt="..." style="object-fit: cover; height: 100%; width: 60%;"
                                     class="img-fluid w-100 w-md-60 w-lg-70">
                            </f:then>
                            <f:else>
                                <div class="card-img-left" style="width: 200px; height: 200px; display: flex; justify-content: center; align-items: center; background-color: #e0e0e0; border: 0px solid #333;">
                                    <i class="fas fa-image" style="font-size: 50px; color: #999;" aria-label="Image not available"></i>
                                </div>
                            </f:else>
                        </f:if>

                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">{campaign.title}</h5>
                            <p class="card-text">{campaign.description}</p>
                            <f:link.action action="showCampaignDetails" arguments="{campaign:campaign}" class="btn btn-outline-secondary btn-sm">Details</f:link.action>
                        </div>
                    </div>
                </li>
            </f:for>
        </ul>
</f:comment>

        <ul class="list-unstyled row">
            <f:for each="{campaigns}" as="campaign">
                <li class="col-xl-4 col-lg-6 col-md-6 col-sm-12 mb-4">
                    <div class="card d-flex flex-column" style="height: 100%;">

                        <f:if condition="{campaign.image}">
                            <f:then>
                                <f:comment>
                                <img src="{image}" class="card-img-top" alt="..."
                                     style="object-fit: cover; height: 200px; width: 100%;"
                                     class="img-fluid">
                                </f:comment>
                                <f:image image="{campaign.imageObject}" class="card-img-top" alt=""
                                         additionalAttributes='{style: "object-fit: cover; height: 200px; width: 100%;"}'/>
                            </f:then>
                            <f:else>
                                <div class="card-img-top" style="width: 100%; height: 200px; display: flex; justify-content: center; align-items: center; background-color: #e0e0e0; border: 0px solid #333;">
                                    <i class="fas fa-image" style="font-size: 50px; color: #999;" aria-label="Image not available"></i>
                                </div>
                            </f:else>
                        </f:if>

                        <div class="card-body d-flex flex-column" style="flex-grow: 1;">
                            <h5 class="card-title">{campaign.title}</h5>
                            <p class="card-text">{campaign.shortDescription}</p>
                            <f:link.action action="showCampaignDetails" arguments="{campaign:campaign}" class="btn btn-outline-secondary btn-sm mt-auto">Details</f:link.action>
                        </div>
                    </div>
                </li>
            </f:for>
        </ul>
    </div>
</f:section>

</html>
