<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

{namespace wlb=Wlb\Crowdsourcing\ViewHelpers}

<f:layout name="Frontend"/>

<f:section name="main">

    <f:render partial="Workflow/Navigation" arguments="{_all}"/>

    <wlb:userInfo as="userInfo" />

    <f:render partial="Workflow/FlashMessages" arguments="{_all}"/>

    <div class="container-fluid mt-3 dashboard">
        <div class="row">
            <div class="col-lg-12 mb-3">
                <section class="dashboard-section dashboard-info">
                    <a class="btn btn-link p-0 d-flex align-items-center gap-2 toggle-arrow"
                       data-bs-toggle="collapse" href="#collapseInfo" role="button"
                       aria-expanded="false" aria-controls="collapseInfo" id="q">
                        <f:comment><span>Was ist die Sammlung Hill?</span></f:comment>
                        <span><f:translate key="dashboard.infoHeader" /></span>
                    </a>

                    <div class="collapse mt-2" id="collapseInfo">
                        <div class="col-2-text">
                            <p class="multi-column">
                                <f:translate key="dashboard.infoDescription" />
                            </p>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <f:for each="{campaigns}" as="campaign" key="campaignKey" iteration="campaignIteration">
        <div class="{f:if(condition: campaignIteration.isFirst, then: 'container-fluid dashboard', else: 'container-fluid mt-5 dashboard')}">
            <f:render partial="Workflow/CampaignDashboard" arguments="{_all}"/>
        </div>
    </f:for>

</f:section>

</html>
