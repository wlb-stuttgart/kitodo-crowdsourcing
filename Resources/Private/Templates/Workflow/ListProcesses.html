<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Frontend"/>

<f:section name="main">

    <style>
        .carousel-image {
            object-fit: cover;
            height: 300px;
            width: 100%;
        }
    </style>

<div class="container">

    <!-- Search Area -->
    <div class="row mb-4">
        <div class="col-12">
            <form class="d-flex justify-content-between align-items-center">
                <!-- Search Input -->
                <div class="form-group mb-0">
                    <input type="text" class="form-control" id="searchInput" placeholder="Search..." aria-label="Search">
                </div>

                <!-- Filter Dropdowns -->
                <div class="d-flex">
                    <!-- Filter 1 -->
                    <div class="form-group mb-0 ms-2">
                        <select class="form-select" id="filter1">
                            <option selected>Filter 1</option>
                            <option value="option1">Option 1</option>
                            <option value="option2">Option 2</option>
                            <option value="option3">Option 3</option>
                        </select>
                    </div>

                    <!-- Filter 2 -->
                    <div class="form-group mb-0 ms-2">
                        <select class="form-select" id="filter2">
                            <option selected>Filter 2</option>
                            <option value="option1">Option 1</option>
                            <option value="option2">Option 2</option>
                            <option value="option3">Option 3</option>
                        </select>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <ul class="list-unstyled row">

        <f:for each="{processes}" as="process">
        <li class="col-xl-2 col-lg-4 col-md-6 col-sm-6 mb-4">
            <div class="card d-flex flex-column" style="height: 100%;">
                <f:if condition="{process.images}">
                    <f:then>
                        <img src="{process.imageInfos.0.image}" class="card-img-top carousel-image" />
                    </f:then>
                    <f:else>
                        <div class="card-img-left" style="width: 100%; height: 200px; display: flex; justify-content: center; align-items: center; background-color: #e0e0e0; border: 0px solid #333;">
                            <i class="fas fa-image" style="font-size: 50px; color: #999;" aria-label="Image not available"></i>
                        </div>
                    </f:else>
                </f:if>

                <!-- Card content below the image -->
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Arbeitsschritt: Erfassung</h5>
                    <p><f:translate key="process.type.{process.type}" /></p>
                    <f:link.action action="editMetadata" arguments="{process: process}" class="btn btn-outline-secondary btn-sm">
                        <f:translate key="process.button.edit" />
                    </f:link.action>
                </div>
            </div>
        </li>
        </f:for>
    </ul>

</div>

</f:section>
</html>
