<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:v="http://typo3.org/ns/FluidTYPO3/Vhs/ViewHelpers"
      xmlns:wlb="http://typo3.org/ns/Wlb/Crowdsourcing/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Frontend"/>

<f:section name="main">

<div class="container">

    <!-- Search Area -->
    <div class="row mb-4 mt-4">
        <div class="col">
            <f:form action="listProcesses"
                    controller="Workflow"
                    pluginName="Campaigns"
                    method="post" name="searchForm" id="searchForm"
                    class="align-items-center">
                <!-- Search Input -->
                <div class="form-group mb-0 search-container">
                    <f:form.textfield name="query"
                                      id="searchInput"
                                      class="form-control"
                                      placeholder="Enter search term"
                                      aria-label="Search"
                                      value="{query}" />
                    <f:form.submit class="btn btn-primary searchSubmit" value="Suchen" />
                </div>
            </f:form>
        </div>
    </div>

    <!-- Facet area -->
    <div class="row mb-4 mt-4">
        <div class="col">
            <f:for each="{facets}" key="facetLabel" as="facetFields">
                <h3>{facetLabel}</h3>
                <f:for each="{facetFields}" key="facetField" as="facet">
                    <ul>
                    <f:for each="{facet}" key="facetName" as="value" iteration="iterator">
                        <li>
                            <f:if condition="{wlb:isFacetActive(facetField:'{facetField}', activeFacets:'{activeFacets}')}">
                                <f:then>
                                    <v:variable.set name="facetActive" value="active"/>
                                </f:then>
                                <f:else>
                                    <v:variable.set name="facetActive" value=""/>
                                </f:else>
                            </f:if>
                            <f:link.action action="listProcesses"
                                           arguments="{wlb:facetArgument(facetValue: '{value}', facetField:'{facetField}', activeFacets:'{activeFacets}')}"
                                           class="{facetActive}">
                                {value} ({facetCounters.{facetField}.{iterator.index}})
                            </f:link.action>
                        </li>
                    </f:for>
                    </ul>
                </f:for>
            </f:for>
        </div>
    </div>

    <ul class="list-unstyled row">

        <f:for each="{processes}" as="process">
        <li class="col-xl-2 col-lg-4 col-md-6 col-sm-6 mb-4">
            <div class="card d-flex flex-column" style="height: 100%;">
                <f:if condition="{process.images}">
                    <f:then>
                        <img src="{process.imageInfos.0.image}" class="card-img-top carousel-image" />
                    </f:then>
                    <f:else>
                        <div class="card-img-left" style="width: 100%; height: 200px; display: flex; justify-content: center; align-items: center; background-color: #e0e0e0; border: 0px solid #333;">
                            <i class="fas fa-image" style="font-size: 50px; color: #999;" aria-label="Image not available"></i>
                        </div>
                    </f:else>
                </f:if>

                <!-- Card content below the image -->
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Arbeitsschritt: Erfassung</h5>
                    <p><f:translate key="process.type.{process.type}" /></p>

                    <f:if condition="(!{process.feUser} || {process.feUser} == {currentUser}) && {editAllowed.{process.uid}}">
                        <f:then>
                            <f:link.action action="editMetadata" arguments="{process: process}" class="btn btn-outline-secondary btn-sm">
                                <f:if condition="{process.feUser} == {currentUser}">
                                    <f:then>
                                        Bearbeitung fortsetzen
                                    </f:then>
                                    <f:else>
                                        <f:translate key="process.button.edit" />
                                    </f:else>
                                </f:if>
                            </f:link.action>
                        </f:then>
                        <f:else>
                            <f:if condition="{editAllowed.{process.uid}}">
                                <f:then>
                                    <button class="btn btn-outline-secondary btn-sm" disabled>Aktuell in Bearbeitung</button>
                                </f:then>
                                <f:else>
                                    <button class="btn btn-outline-secondary btn-sm" disabled>Wurde bereits bearbeitet</button>
                                </f:else>
                            </f:if>

                        </f:else>
                    </f:if>

                </div>
            </div>
        </li>
        </f:for>
    </ul>

</div>

</f:section>
</html>
