<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Frontend"/>

<f:section name="main">

    <style>
        .carousel-image {
            object-fit: cover;
            height: 300px;
            width: 100%;
        }
    </style>

    <div class="container-fluid"> <!-- Use container-fluid for full width -->
        <div class="row p-5">
            <!-- Image Section: Ensure this spans full width -->
            <div class="col-12">
                <f:if condition="{campaign.image}">
                    <f:then>
                        <f:comment>
                            <img src="{image}" class="img-fluid w-100" alt="" style="object-fit: cover; height: 300px;">
                        </f:comment>

                        <f:image image="{campaign.imageObject}" class="img-fluid w-100" alt="" width="770c" height="517c"
                                 additionalAttributes='{style: "object-fit: cover; height: 400px; object-position: center;"}'/>
                    </f:then>
                    <f:else>
                        <div class="img-fluid w-100" style="height: 300px; display: flex; justify-content: center; align-items: center; background-color: #e0e0e0; border: 0px solid #333;">
                            <i class="fas fa-image" style="font-size: 50px; color: #999;" aria-label="Image not available"></i>
                        </div>
                    </f:else>
                </f:if>
            </div>

            <!-- Content Section: Ensure this spans full width -->
            <div class="col-12 mt-4">
                <div class="mt-sm-2">
                    <h1 class="h1">{campaign.title}</h1>
                    <f:if condition="{campaign.subtitle}">
                        <h2 class="h2">{campaign.subtitle}</h2>
                    </f:if>
                    <f:if condition="{campaign.description}">
                        <div><f:format.raw>{campaign.description}</f:format.raw></div>
                    </f:if>
                    <div class="col-md-5 col-lg-4 order-md-last">
                        <a href="#">
                            <h4 class="d-flex justify-content-between align-items-center mb-3">
                                <span class="text-primary">Plakate</span>
                                <span class="badge bg-primary rounded-pill">{campaign.processCount}</span>
                            </h4>
                        </a>
                    </div>
                </div>
            </div>

            <ul class="list-unstyled row">
                <f:for each="{campaign.processes}" as="process">
                    <li class="col-xl-2 col-lg-4 col-md-6 col-sm-6 mb-4">
                        <div class="card d-flex flex-column" style="height: 100%;">
                            <f:if condition="{process.images}">
                                <f:then>
                                    <img src="{process.imageInfos.0.image}" class="card-img-top carousel-image" />
                                </f:then>
                                <f:else>
                                    <div class="card-img-left" style="width: 100%; height: 200px; display: flex; justify-content: center; align-items: center; background-color: #e0e0e0; border: 0px solid #333;">
                                        <i class="fas fa-image" style="font-size: 50px; color: #999;" aria-label="Image not available"></i>
                                    </div>
                                </f:else>
                            </f:if>

                            <!-- Card content below the image -->
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">Arbeitsschritt: Erfassung</h5>
                                <p><f:translate key="process.type.{process.type}" /></p>
                                <f:link.action action="editMetadata" arguments="{process: process}" class="btn btn-outline-secondary btn-sm">
                                    <f:translate key="process.button.edit" />
                                </f:link.action>
                            </div>
                        </div>
                    </li>
                </f:for>
            </ul>
        </div>
    </div>

</f:section>

</html>
