<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">


<f:layout name="Backend/Campaign"/>

<f:section name="main">


    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header text-center">
                        <h4><f:translate extensionName="crowdsourcing" key="campaignModule.editCampaign" /></h4>
                    </div>
                    <div class="card-body">
                        <f:form id="update-campaign" action="update" object="{campaign}" objectName="campaign" method="post" enctype="multipart/form-data">

                            <f:render partial="Backend/Campaign/CampaignFields" arguments="{campaign: campaign}"/>

                            <div class="mb-3">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <f:form.submit name="createCampaign" value="{f:translate(extensionName:'crowdsourcing' key:'campaignModule.save')}" class="btn btn-primary w-100" />
                                    </div>

                                    <div class="col-md-6">
                                        <button id="cancelEdit" type="button" class="btn btn-secondary w-100">
                                            {f:translate(extensionName:'crowdsourcing' key:'campaignModule.cancel')}
                                        </button>
                                    </div>
                                </div>
                            </div>

                        </f:form>

                    </div>
                </div>
            </div>
        </div>
    </div>



</f:section>

</html>


<f:comment>

    <div class="container" style="padding-top: 50px; padding-bottom: 50px;">
        <div class="row text-center">
            <div class="col-md-8 col-md-offset-2">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <h4>Create a New Campaign</h4>
                        <p>Fill in the details below to create a new campaign</p>
                    </div>
                    <div class="panel-body">
                        <f:form action="update" object="{campaign}" objectName="campaign" method="post" enctype="multipart/form-data">

                            <f:render partial="Backend/Campaign/CampaignFields" />

                            <div class="form-group">
                                <div class="row">
                                    <div class="col-md-6">
                                        <f:form.submit name="createCampaign" value="Update Campaign" class="btn btn-primary btn-block" />
                                    </div>

                                    <div class="col-md-6">
                                        <button type="button" class="btn btn-secondary btn-block" onclick="window.history.back();">Cancel</button>
                                    </div>
                                </div>
                            </div>

                        </f:form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</f:comment>
