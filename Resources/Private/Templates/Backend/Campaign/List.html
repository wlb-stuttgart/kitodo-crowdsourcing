
<f:layout name="Backend/Campaign"/>

<f:section name="main">
    <div class="container py-5">
        <div class="row text-center">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h4>Manage Your Campaigns</h4>
                        <p>Here is a list of your existing campaigns. You can search, assign processes, edit, or delete them.</p>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="searchCampaign" class="form-label">Search Campaigns</label>
                                    <input type="text" class="form-control" id="searchCampaign" placeholder="Search by name..." onkeyup="filterCampaigns()">
                                </div>
                            </div>
                        </div>

                        <table class="table table-striped" id="campaignTable">
                            <colgroup>
                                <col style="width: 65%;">
                                <col style="width: 35%;">
                            </colgroup>
                            <thead>
                            <tr>
                                <th>Title</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>

                            <f:for each="{campaigns}" as="campaign">
                                <tr class="campaign" data-name="{campaign.title}">
                                    <td>{campaign.title}</td>
                                    <td>
                                        <f:link.action action="listProcesses" arguments="{campaign: campaign}" class="btn btn-primary btn-sm">
                                            Processes
                                        </f:link.action>

                                        <f:link.action action="edit" arguments="{campaign: campaign}" class="btn btn-info btn-sm">
                                            Edit
                                        </f:link.action>

                                        <f:if condition="{campaign.new}">
                                            <f:link.action action="publish" arguments="{campaign: campaign, page: currentPage}" class="btn btn-warning btn-sm">
                                                Publish
                                            </f:link.action>
                                        </f:if>

                                        <f:if condition="{campaign.published}">
                                            <f:link.action action="close" arguments="{campaign: campaign, page: currentPage}" class="btn btn-warning btn-sm">
                                                Close
                                            </f:link.action>
                                        </f:if>

                                        <f:if condition="{campaign.closed}">
                                            <f:link.action action="reopen" arguments="{campaign: campaign, page: currentPage}" class="btn btn-warning btn-sm">
                                                Unclose and Publish
                                            </f:link.action>
                                        </f:if>

                                        <a href="#" class="btn btn-danger btn-sm">Delete</a>
                                    </td>
                                </tr>
                            </f:for>

                            </tbody>
                        </table>

                        <div class="pagination">
                            <f:if condition="{currentPage} > 1">
                                <a href="{f:uri.action(action: 'list', arguments: {page: previousPage})}" class="btn btn-secondary btn-sm">Previous</a>
                            </f:if>

                            <f:for each="{pageNumbers}" as="page">
                                <a href="{f:uri.action(action: 'list', arguments: {page: page})}" class="btn btn-secondary btn-sm {f:if(condition: page == currentPage, then: 'active', else: '')}">
                                    {page}
                                </a>
                            </f:for>

                            <f:if condition="{currentPage} < {totalPages}">
                                <a href="{f:uri.action(action: 'list', arguments: {page: nextPage})}" class="btn btn-secondary btn-sm">Next</a>
                            </f:if>
                        </div>

                        <div class="alert alert-info d-none" role="alert" id="noCampaignsAlert">
                            <strong>Info!</strong> You have no campaigns to manage at the moment.
                        </div>

                        <f:link.action action="new" class="btn btn-primary btn-block">+</f:link.action>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function filterCampaigns() {
            var searchInput = document.getElementById('searchCampaign').value.toLowerCase();
            var campaigns = document.querySelectorAll('.campaign');
            var noCampaigns = true;

            campaigns.forEach(function(campaign) {
                var name = campaign.getAttribute('data-name').toLowerCase();
                // Check if campaign matches search and filters
                var matchesSearch = name.includes(searchInput);
                if (matchesSearch) {
                    campaign.style.display = '';
                    noCampaigns = false;
                } else {
                    campaign.style.display = 'none';
                }
            });

            if (noCampaigns) {
                document.getElementById('noCampaignsAlert').style.display = 'block';
            } else {
                document.getElementById('noCampaignsAlert').style.display = 'none';
            }
        }
    </script>

</f:section>
