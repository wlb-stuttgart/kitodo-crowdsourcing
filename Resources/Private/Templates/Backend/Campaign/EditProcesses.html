<!-- Container for Task List Page -->

<f:layout name="Backend/Campaign"/>

<f:section name="main">
    <script>
        let processUid = {processUid}
    </script>

    <script type="module" src="{f:uri.resource(path:'EXT:crowdsourcing/Resources/Public/JavaScript/Backend/CampaignModule.js')}"></script>


    <!-- Container for Process List Page -->
    <div class="container" style="padding-top: 50px; padding-bottom: 50px;">
        <div class="row text-center">
            <div class="col-md-8 col-md-offset-2">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <h4>Manage Processes</h4>
                        <p>Here is a list of processes associated with your campaigns. You can search, filter, and manage them.</p>
                        <f:link.action action="listProcesses" arguments="{campaign:currentCampaign}" class="btn btn-primary btn-block">Close</f:link.action>
                    </div>
                    <div class="panel-body">
                        <!-- Search and Filter Bar -->
                        <div class="row">
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label for="searchTask">Search Processes</label>
                                    <input type="text" class="form-control" id="searchTask" placeholder="Search by task name..." onkeyup="filterTasks()">
                                </div>
                            </div>
                        </div>

                        <table class="table table-striped" id="taskTable">
                            <thead>
                            <tr>
                                <th></th>
                                <th>Name</th>
                                <th>Status</th>
                                <th>Images</th>
                            </tr>
                            </thead>
                            <tbody>


                            <f:for each="{processes}" as="process">
                            <tr class="task" id="{process.uid}" data-name="Create Campaign Landing Page" data-status="In Progress" data-priority="High">
                                <td>
                                    <f:if condition="{process.campaign.uid} == {currentCampaign.uid}">
                                        <f:then>
                                            <f:link.action action="removeProcessFromCampaign" arguments="{process:process, campaign:currentCampaign}" class="btn btn-danger btn-block btn-sm">remove</f:link.action>
                                        </f:then>
                                        <f:else>
                                            <f:link.action action="addProcessToCampaign" arguments="{process:process, campaign:currentCampaign}" class="btn btn-primary btn-block btn-sm">add</f:link.action>
                                        </f:else>
                                    </f:if>


                                    <f:comment>
                                        <input
                                                class="form-check-input"
                                                type="checkbox"
                                                value=""
                                                id="flexCheckDefault"
                                               {f:if(condition:'{process.campaign.uid} == {currentCampaign.uid}', then: 'checked', else: '')} />
                                        </f:comment>



                                </td>

                                <td>{process.metadataForDisplay.signature}</td>
                                <td><span class="label label-warning">In Progress</span></td>
                                <td>
                                    <div id="carouselTask1" class="carousel slide" data-ride="carousel">
                                        <ol class="carousel-indicators">
                                            <li data-target="#carouselTask1" data-slide-to="0" class="active"></li>
                                            <li data-target="#carouselTask1" data-slide-to="1"></li>
                                        </ol>

                                        <div class="carousel-inner" role="listbox">
                                            <f:for each="{process.images}" as="imageName" iteration="index">
                                                <div class="item {f:if(condition:'{index.index} == 0', then: 'active', else: '')}">
                                                    <f:image src="file:{importedPath}/{process.identifier}/images/{imageName}" alt="Image" class="d-block w-100" />
                                                </div>
                                            </f:for>
                                        </div>

                                        <a class="carousel-control-prev" href="#carouselTask1" role="button" data-slide="prev">
                                            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                            <span class="sr-only">Previous</span>
                                        </a>
                                        <a class="carousel-control-next" href="#carouselTask1" role="button" data-slide="next">
                                            <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                            <span class="sr-only">Next</span>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            </f:for>

                            </tbody>
                        </table>

                        <div class="alert alert-info" role="alert" style="display:none;" id="noTasksAlert">
                            <strong>Info!</strong> You have no processes to manage at the moment.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>




    <script>
        // Function to filter tasks by search and filters
        function filterTasks() {
            var searchInput = document.getElementById('searchTask').value.toLowerCase();
            var statusFilter = document.getElementById('filterTaskStatus').value.toLowerCase();
            var priorityFilter = document.getElementById('filterTaskPriority').value.toLowerCase();

            var tasks = document.querySelectorAll('.task');
            var noTasks = true;

            tasks.forEach(function(task) {
                var name = task.getAttribute('data-name').toLowerCase();
                var status = task.getAttribute('data-status').toLowerCase();
                var priority = task.getAttribute('data-priority').toLowerCase();

                // Check if task matches search and filters
                var matchesSearch = name.includes(searchInput);
                var matchesStatus = (statusFilter === "" || status.includes(statusFilter));
                var matchesPriority = (priorityFilter === "" || priority.includes(priorityFilter));

                if (matchesSearch && matchesStatus && matchesPriority) {
                    task.style.display = '';
                    noTasks = false;
                } else {
                    task.style.display = 'none';
                }
            });

            // Show "No Tasks" message if no tasks match
            if (noTasks) {
                document.getElementById('noTasksAlert').style.display = 'block';
            } else {
                document.getElementById('noTasksAlert').style.display = 'none';
            }
        }
    </script>


</f:section>
