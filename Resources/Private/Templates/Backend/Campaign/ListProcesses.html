<!-- Container for Task List Page -->

<f:layout name="Backend/Campaign"/>
<f:section name="main">
    <div class="container mt-5">

        <h1>{campaign.title}</h1>
        <h2>Processes</h2>

        <f:link.action action="editProcesses" arguments="{campaign:campaign}" class="btn btn-primary btn-block">Edit List</f:link.action>
        <f:link.action action="list" class="btn btn-primary btn-block">Close</f:link.action>

        <div class="row">
            <!-- Blog Post 1 -->
            <div class="col-xs-12">
                <div class="row" style="border-bottom: 1px solid #ddd; padding-bottom: 15px; margin-bottom: 15px;">
                        <f:form action="listProcesses" method="post" name="searchForm" id="searchForm">
                            <f:form.textfield name="search" placeholder="Enter search term" value="{search}" id="searchTask" class="form-control" placeholder="Search ..." />
                        </f:form>
                </div>
                <f:for each="{documents}" as="document">
                <div class="row" style="border-bottom: 1px solid #ddd; padding-bottom: 15px; margin-bottom: 15px;">
                    <!-- Image on the Left -->
                    <div class="col-xs-4">
                        <!-- Bootstrap Carousel for image slider (Bootstrap 3) -->
                        <div id="carousel-{document.identifier}" class="carousel slide" data-ride="carousel">
                            <!-- Indicators (optional) -->
                            <ol class="carousel-indicators">
                                <f:for each="{document.images}" as="imageName" iteration="index">
                                    <li data-target="#carousel-{document.identifier}" data-slide-to="{index.index}" class="{f:if(condition: index.index == 0, then: 'active')}"></li>
                                </f:for>
                            </ol>

                            <!-- Wrapper for slides -->
                            <div class="carousel-inner">
                                <f:for each="{document.images}" as="imageName" iteration="index">
                                    <div class="item {f:if(condition:'{index.index} == 0', then: 'active', else: '')}">
                                        <f:image src="file:{importedPath}/{document.identifier}/images/{imageName}" alt="Image" class="d-block w-100" />
                                    </div>
                                </f:for>
                            </div>

                            <!-- Left and right controls -->
                            <a class="left carousel-control" href="#carousel-{document.identifier}" role="button" data-slide="prev">
                                <span class="glyphicon glyphicon-chevron-left" aria-hidden="true"></span>
                                <span class="sr-only">Previous</span>
                            </a>
                            <a class="right carousel-control" href="#carousel-{document.identifier}" role="button" data-slide="next">
                                <span class="glyphicon glyphicon-chevron-right" aria-hidden="true"></span>
                                <span class="sr-only">Next</span>
                            </a>
                        </div>
                    </div>

                    <!-- Text Content on the Right -->
                    <div class="col-xs-8">
                        <h2>{document.metadataForDisplay.signature}</h2>
                        <div class="post-meta"></div>
                        <p></p>
                    </div>
                </div>
                </f:for>

        </div>
    </div>

</f:section>
