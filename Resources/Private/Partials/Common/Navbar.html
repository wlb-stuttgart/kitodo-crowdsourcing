{namespace wlb=Wlb\Crowdsourcing\ViewHelpers}

<wlb:userInfo as="userInfo" />

<nav class="navbar navbar-light bg-light">
    <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center" href="#">
            <f:comment>
                <img src="/fileadmin/images/logo.svg" alt="Logo" width="30" height="30" class="me-2">
            </f:comment>
            Crowdsourcing
        </a>

        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 flex-row gap-3 align-items-center">
            <f:if condition="{userInfo}">
                <f:then>
                    <li class="nav-item">
                        <span class="nav-link">Hi, {userInfo.username}</span>
                    </li>
                    <li class="nav-item">
                        <f:link.page pageUid="{settings.crowdsourcingLogin}" additionalParams="{logintype: 'logout'}" noCacheHash="1" class="nav-link" title="Logout">
                            Logout
                        </f:link.page>
                    </li>
                </f:then>
                <f:else>
                    <li class="nav-item">
                        <f:link.page pageUid="{settings.crowdsourcingLogin}" class="nav-link" title="Login">
                            Login
                        </f:link.page>
                    </li>
                </f:else>
            </f:if>
        </ul>
    </div>
</nav>
