<div class="form-group">
    <label for="campaignTitle"><f:translate extensionName="crowdsourcing" key="campaignModule.title" /></label>
    <f:form.textfield
            property="title"
            class="form-control"
            id="campaignTitle"
            placeholder=""
            required = "1" />
</div>

<f:comment>
<div class="form-group mt-3">
    <label for="campaignSubtitle"><f:translate extensionName="crowdsourcing" key="campaignModule.subtitle" /></label>

    <f:form.textarea
            property="subtitle"
            class="form-control"
            id="campaignSubtitle"
            placeholder="Enter a subtitle"
            rows="4"
            required = "0" />
</div>
</f:comment>

<f:comment>
<div class="form-group">
    <label for="campaignShortDescription"><f:translate extensionName="crowdsourcing" key="campaignModule.shortDescription" /></label>

    <f:form.textarea
            property="shortDescription"
            class="form-control"
            id="campaignShortDescription"
            placeholder="Enter a short description of the campaign"
            rows="4"
            required = "1" />
</div>
</f:comment>

<div class="form-group mt-3">
    <label for="campaignDescription"><f:translate extensionName="crowdsourcing" key="campaignModule.description" /></label>

    <f:form.textarea
            property="description"
            class="form-control"
            id="campaignDescription"
            placeholder=""
            rows="8"
            required = "1" />
</div>

<div class="form-group mt-3 mb-3">
    <f:if condition="{campaign.image}">
        <f:comment>
            <div>
                Existing Filename: {campaign.image.originalResource.name}
            </div>
        </f:comment>
        <div>
            <f:form.uploadDeleteCheckbox class="form-check-input" id="file-delete" property="image" fileReference="{campaign.image}" />
            <label for="file" class="form-check-label">
                <f:translate extensionName="crowdsourcing" key="campaignModule.deleteOrChange" /></label>
        </div>
    </f:if>
    <f:if condition="{campaign.image}">
        <f:image image="{campaign.image}" class="img-fluid w-100" alt="" width="770c" height="517c"
                 additionalAttributes='{style: "object-fit: cover; height: 400px; object-position: center;"}'/>

    </f:if>
</div>

<div class="form-group mt-3 mb-3">
    <label for="file"><f:translate extensionName="crowdsourcing" key="campaignModule.uploadImage" /></label></label>
    <f:form.upload property="image" id="file-upload" allowEmpty="1" />
</div>
