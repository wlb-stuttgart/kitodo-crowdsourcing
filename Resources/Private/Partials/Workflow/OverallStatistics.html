<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

    <h2><f:translate key="statistic.overall" /> &bdquo;{campaign.title}&ldquo;</h2>
    <div class="card shadow-sm mt-3">
        <div class="card-body">
            <f:comment>
            <div class="row row-cols-2 row-cols-md-3 g-3 text-left">
                <div class="col">
                    <div class="text-muted small" style="white-space: normal;">
                        {f:translate(key: 'statistic.countAll')}
                    </div>
                    <div class="fs-4 fw-bold">
                        <span class="badge chart-badge-total">{statistic.countAll}</span>
                    </div>
                </div>

                <div class="col">
                    <div class="text-muted small" style="white-space: normal;">
                        {f:translate(key: 'process.state.NEW')}
                    </div>
                    <div class="fs-4 fw-bold">
                        <span class="badge chart-badge-new" style="background-color: #a0c5ce;">{statistic.countNew}</span>
                    </div>
                </div>

                <div class="col">
                    <div class="text-muted small" style="white-space: normal;">
                        {f:translate(key: 'process.state.CORRECTION')}
                    </div>
                    <div class="fs-4 fw-bold">
                        <span class="badge chart-badge-correction" style="background-color: #499daf;">{statistic.countCorrection}</span>
                    </div>
                </div>

                <div class="col">
                    <div class="text-muted small" style="white-space: normal;">
                        {f:translate(key: 'process.state.COMPLETED')}
                    </div>
                    <div class="fs-4 fw-bold">
                        <span class="badge chart-badge-completed" style="background-color: #3a7e8c;">{statistic.countCompleted}</span>
                    </div>
                </div>
            </div>
            </f:comment>

            <div class="mt-3"
                 id="statistic-chart"
                 data-count-new="{statistic.countNew}"
                 data-count-correction="{statistic.countCorrection}"
                 data-count-completed="{statistic.countCompleted}"
                 data-count-all="{statistic.countAll}"
                 data-label-new="{f:translate(key: 'process.state.NEW')}"
                 data-label-correction="{f:translate(key: 'process.state.CORRECTION')}"
                 data-label-completed="{f:translate(key: 'process.state.COMPLETED')}">
            </div>
        </div>
    </div>
</html>
