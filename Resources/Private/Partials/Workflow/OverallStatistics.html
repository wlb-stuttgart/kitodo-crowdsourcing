<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:wlb="http://typo3.org/ns/Wlb/Crowdsourcing/ViewHelpers"
      data-namespace-typo3-fluid="true">

    <h2><f:translate key="statistic.overall" /> &bdquo;{campaign.title}&ldquo;</h2>
    <div class="card shadow-sm mt-3">
        <div class="card-body">
            <div class="mt-3 statistic-chart"
                 id="statistic-chart"
                 data-count-unedited="{statistic.countUnedited.{campaign.uid}}"
                 data-count-in-progress="{statistic.countInProgress.{campaign.uid}}"
                 data-count-completed="{statistic.countCompleted.{campaign.uid}}"
                 data-count-all="{statistic.countAll.{campaign.uid}}"
                 data-label-unedited="{f:translate(key: 'statistic.unedited')}"
                 data-label-in-progress="{f:translate(key: 'statistic.inProgress')}"
                 data-label-completed="{f:translate(key: 'statistic.completed')}">
            </div>

            <f:variable name="topTenOverall" value="{statistic.topTenEditorsByCampaign.{campaign.uid}}" />
            <f:variable name="topTenLastMonth" value="{statistic.topTenEditorsByCampaignLastMonth.{campaign.uid}}" />

            <f:if condition="{topTenOverall} || {topTenLastMonth}">
                <div class="row mt-4">
                    <f:render partial="Workflow/TopTenList" arguments="{list: topTenOverall, titleKey: 'statistic.topTen.overall', id: 'Overall', campaign: campaign, initialCount: 3}" />
                    <f:render partial="Workflow/TopTenList" arguments="{list: topTenLastMonth, titleKey: 'statistic.topTen.lastMonth', id: 'LastMonth', campaign: campaign, initialCount: 3}" />
                </div>
            </f:if>

        </div>
    </div>
</html>
