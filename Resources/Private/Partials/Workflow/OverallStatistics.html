<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

    <h2><f:translate key="statistic.overall" /> &bdquo;{campaign.title}&ldquo;</h2>
    <div class="card shadow-sm mt-3">
        <div class="card-body">
            <div class="mt-3"
                 id="statistic-chart"
                 data-count-unedited="{statistic.countUnedited}"
                 data-count-in-progress="{statistic.countInProgress}"
                 data-count-completed="{statistic.countCompleted}"
                 data-count-all="{statistic.countAll}"
                 data-label-unedited="{f:translate(key: 'statistic.unedited')}"
                 data-label-in-progress="{f:translate(key: 'statistic.inProgress')}"
                 data-label-completed="{f:translate(key: 'statistic.completed')}">
            </div>
        </div>
    </div>
</html>
