<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

    <h2><f:translate key="statistic.personal" /></h2>
    <div class="card shadow-sm mt-3">
        <div class="card-body">
            <f:comment>
            <div class="row row-cols-2 row-cols-md-3 g-3 text-left">
                <div class="col">
                    <div class="text-muted small" style="white-space: normal;"><f:translate key="statistic.countAll" /></div>
                    <div class="fs-4 fw-bold">
                        <span class="badge chart-badge-total">{statistic.countAll}</span>
                    </div>
                </div>

                <div class="col">
                    <div class="text-muted small" style="white-space: normal;"><f:translate key="process.state.NEW" /></div>
                    <div class="fs-4 fw-bold">
                        <span class="badge chart-badge-new">{userStatistic.countNew}</span>
                    </div>
                </div>

                <div class="col">
                    <div class="text-muted small" style="white-space: normal;"><f:translate key="process.state.CORRECTION" /></div>
                    <div class="fs-4 fw-bold">
                        <span class="badge chart-badge-correction">{userStatistic.countCorrection}</span>
                    </div>
                </div>

                <div class="col">
                    <div class="text-muted small" style="white-space: normal;"><f:translate key="process.state.FINAL_CORRECTION" /></div>
                    <div class="fs-4 fw-bold">
                        <span class="badge chart-badge-final-correction">{userStatistic.countFinalCorrection}</span>
                    </div>
                </div>

                <div class="col">
                    <div class="text-muted small" style="white-space: normal;"><f:translate key="process.state.COMPLETED" /></div>
                    <div class="fs-4 fw-bold">
                        <span class="badge chart-badge-completed">{userStatistic.countCompleted}</span>
                    </div>
                </div>
            </div>
            </f:comment>

            <div class="mt-3"
                 id="user-statistic-chart"
                 data-count-new="{userStatistic.countNew}"
                 data-count-correction="{userStatistic.countCorrection}"
                 data-count-final-correction="{userStatistic.countFinalCorrection}"
                 data-count-completed="{userStatistic.countCompleted}"
                 data-count-all="{userStatistic.countAll}"
                 data-label-new="{f:translate(key: 'process.state.NEW')}"
                 data-label-correction="{f:translate(key: 'process.state.CORRECTION')}"
                 data-label-final-correction="{f:translate(key: 'process.state.FINAL_CORRECTION')}"
                 data-label-completed="{f:translate(key: 'process.state.COMPLETED')}"
                 data-label-all="{f:translate(key: 'statistic.countAll')}">
            </div>
        </div>
    </div>
</html>
