<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:v="http://typo3.org/ns/FluidTYPO3/Vhs/ViewHelpers"
      data-namespace-typo3-fluid="true">

<section class="container-fluid mt-4">
    <div class="status-bar">
        <div class="row align-items-center">
            <div class="col-md-5 d-flex gap-2">
                <span class="state-badge badge-active">{f:translate(key:'process.state.{process.state}')}</span>
            </div>
        </div>

        <div>
            <ol class="breadcrumb">
                <f:for each="{stateReport}" as="stateReportEntry" key="state" iteration="index">
                    <f:if condition="{index.cycle} < 4">
                        <f:if condition="{stateReportEntry.progress} != 'current' && {stateReportEntry.progress} != 'upcoming'">
                            <li class="breadcrumb-item">
                                <span class="editor-label"><f:translate key="process.editor.state.{state}" />:</span>
                                <f:switch expression="{stateReportEntry.userState}">
                                    <f:case value="named">{stateReportEntry.username}</f:case>
                                    <f:case value="anonymous"><f:translate key="process.editor.anonymous" /></f:case>
                                    <f:case value="deleted"><f:translate key="process.editor.deleted" /></f:case>
                                    <f:defaultCase>
                                        <f:if condition="{stateReportEntry.username}">
                                            <f:then>{stateReportEntry.username}</f:then>
                                            <f:else><f:translate key="process.editor.anonymous" /></f:else>
                                        </f:if>
                                    </f:defaultCase>
                                </f:switch>
                            </li>
                        </f:if>
                    </f:if>
                </f:for>
            </ol>
        </div>
    </div>
</section>

</html>
